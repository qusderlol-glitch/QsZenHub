<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QsZenHub | Global Cloud</title>
    <style>
        :root {
            --bg: #050505;
            --neon-pink: #ff007f;
            --neon-orange: #ff4e00;
            --neon-red: #ff0000;
            --neon-cyan: #00f3ff;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Навигация */
        nav {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            background: #0a0a0a;
            border-bottom: 2px solid var(--neon-pink);
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.4);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-btn {
            background: transparent;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 10px 25px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--neon-cyan);
            background: var(--neon-cyan);
            color: #000;
        }

        .container {
            max-width: 800px;
            width: 90%;
            margin-top: 40px;
            display: none;
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .active { display: block; }

        /* Зона загрузки */
        .upload-zone {
            border: 3px dashed var(--neon-pink);
            padding: 50px;
            text-align: center;
            border-radius: 15px;
            background: rgba(255, 0, 127, 0.05);
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .upload-zone:hover {
            background: rgba(255, 78, 0, 0.1);
            border-color: var(--neon-orange);
            box-shadow: inset 0 0 20px rgba(255, 78, 0, 0.5);
        }

        .file-info-display {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid var(--neon-cyan);
            border-radius: 8px;
            display: none;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #111;
            padding: 25px;
            border-radius: 10px;
            border: 1px solid #333;
        }

        input, textarea {
            background: #000;
            border: 1px solid #444;
            padding: 15px;
            color: #fff;
            border-radius: 5px;
            font-family: inherit;
        }

        input:focus, textarea:focus { border-color: var(--neon-orange); outline: none; box-shadow: 0 0 10px rgba(255, 78, 0, 0.3); }

        /* Библиотека */
        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .file-card {
            background: #151515;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid var(--neon-red);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .file-card h3 { margin: 0 0 5px 0; color: var(--neon-orange); word-wrap: break-word; }
        .file-card p { font-size: 0.9em; color: #ccc; }
        .file-card .meta { font-size: 0.8em; color: #777; margin-bottom: 15px; }
    </style>
</head>
<body>

<nav>
    <button class="nav-btn" onclick="window.showTab('upload')">Drop a File</button>
    <button class="nav-btn" onclick="window.showTab('library')">Library</button>
</nav>

<div id="upload" class="container active">
    <h2 style="color: var(--neon-pink)">GLOBAL UPLOAD SECTOR</h2>
    <div class="upload-zone" id="drop-zone" onclick="document.getElementById('fileInput').click()">
        <p style="font-size: 1.2em; margin-bottom: 10px;">Click or Drag & Drop your application here</p>
        <p style="color: #666; font-size: 0.9em; margin-top: 0;">Limit: 1 GB (Cloud Storage)</p>
        <input type="file" id="fileInput" hidden onchange="window.handleFileSelect(this.files)">
        
        <div id="fileInfo" class="file-info-display">
            <strong style="color: var(--neon-cyan)">[Selected File]:</strong> <span id="fileName"></span><br>
            <span style="color: #888; font-size: 0.9em;">Size: <span id="fileSize"></span> MB</span>
        </div>
    </div>

    <div class="input-group">
        <input type="text" id="appName" placeholder="App Name (e.g. CyberTool v1)">
        <textarea id="appDesc" rows="3" placeholder="Description of the file..."></textarea>
        <button id="uploadBtn" class="nav-btn" style="border-color: var(--neon-orange); color: var(--neon-orange)" onclick="window.uploadFile()">Push to Cloud</button>
    </div>
</div>

<div id="library" class="container">
    <h2 style="color: var(--neon-cyan)">PUBLIC ARCHIVE</h2>
    <div class="library-grid" id="library-grid">
        <p style="color: #666;">Connecting to Firebase Nodes...</p>
    </div>
</div>

<script type="module">
    // Импортируем Firebase из сети (CDN)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

    // ТВОИ КЛЮЧИ!
    const firebaseConfig = {
        apiKey: "AIzaSyBwb8ilSQI5HU39wbePUBOQgspSGBadTtc",
        authDomain: "qszenhub-16e51.firebaseapp.com",
        projectId: "qszenhub-16e51",
        storageBucket: "qszenhub-16e51.firebasestorage.app",
        messagingSenderId: "30448238074",
        appId: "1:30448238074:web:92724d08d5a29f6288f843"
    };

    // Запускаем серверные компоненты
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let currentFile = null;

    // Вспомогательные функции (вешаем на window, чтобы HTML их видел)
    window.showTab = function(id) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'library') window.renderLibrary();
    };

    window.handleFileSelect = function(files) {
        if (files.length > 0) {
            currentFile = files[0];
            document.getElementById('fileInfo').style.display = 'block';
            document.getElementById('fileName').innerText = currentFile.name;
            document.getElementById('fileSize').innerText = (currentFile.size / (1024 * 1024)).toFixed(2);
        }
    };

    // ФУНКЦИЯ ЗАГРУЗКИ В ОБЛАКО
    window.uploadFile = async function() {
        const title = document.getElementById('appName').value;
        const desc = document.getElementById('appDesc').value;
        const btn = document.getElementById('uploadBtn');

        if (!currentFile) return alert("Error: Please select a file first!");
        if (!title) return alert("Error: Please provide an App Name!");

        btn.innerText = "UPLOADING TO CLOUD... PLEASE WAIT";
        btn.disabled = true;

        try {
            // 1. Отправляем физический файл в Storage
            // Генерируем уникальное имя, чтобы файлы с одинаковым названием не перезаписывали друг друга
            const uniqueFileName = Date.now() + '_' + currentFile.name;
            const storageRef = ref(storage, 'global_uploads/' + uniqueFileName);
            
            await uploadBytes(storageRef, currentFile);
            
            // 2. Получаем ссылку для скачивания
            const downloadUrl = await getDownloadURL(storageRef);

            // 3. Записываем информацию в Базу Данных
            await addDoc(collection(db, "neon_apps"), {
                name: title,
                description: desc,
                fileName: currentFile.name,
                fileUrl: downloadUrl,
                timestamp: new Date().toLocaleString()
            });

            alert("Protocol PUSH successful! File is now live on the server.");
            
            // Очищаем форму
            currentFile = null;
            document.getElementById('fileInfo').style.display = 'none';
            document.getElementById('appName').value = '';
            document.getElementById('appDesc').value = '';
            
            // Переключаемся в библиотеку
            window.showTab('library');

        } catch (error) {
            console.error("Firebase Error:", error);
            alert("Upload failed! Make sure Firestore and Storage are set to 'Test Mode'. Error: " + error.message);
        } finally {
            btn.innerText = "Push to Cloud";
            btn.disabled = false;
        }
    };

    // ФУНКЦИЯ ПОЛУЧЕНИЯ ДАННЫХ ИЗ ОБЛАКА
    window.renderLibrary = async function() {
        const grid = document.getElementById('library-grid');
        grid.innerHTML = '<p style="color: var(--neon-cyan);">Synchronizing with global database...</p>';

        try {
            // Запрашиваем все загруженные файлы
            const q = query(collection(db, "neon_apps"));
            const querySnapshot = await getDocs(q);
            
            grid.innerHTML = ''; // Очищаем статус загрузки

            if (querySnapshot.empty) {
                grid.innerHTML = '<p style="color: #666; grid-column: 1/-1; text-align: center;">No files uploaded yet. Be the first!</p>';
                return;
            }

            // Рисуем карточки
            querySnapshot.forEach((doc) => {
                const f = doc.data();
                const card = document.createElement('div');
                card.className = 'file-card';
                card.innerHTML = `
                    <div>
                        <h3>${f.name}</h3>
                        <div class="meta">📁 ${f.fileName} <br> 🕒 ${f.timestamp}</div>
                        <p>${f.description}</p>
                    </div>
                    <a href="${f.fileUrl}" target="_blank" style="text-decoration:none;">
                        <button class="nav-btn" style="width:100%; border-color: var(--neon-red); color: white; background: var(--neon-red); margin-top: 15px;">
                            ⬇ Download Asset
                        </button>
                    </a>
                `;
                grid.appendChild(card);
            });
        } catch (error) {
            console.error(error);
            grid.innerHTML = '<p style="color: var(--neon-red);">Failed to fetch data. Check database permissions.</p>';
        }
    };

    // Drag and Drop события для зоны загрузки
    const dz = document.getElementById('drop-zone');
    dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.style.borderColor = 'var(--neon-orange)'; });
    dz.addEventListener('dragleave', () => { dz.style.borderColor = 'var(--neon-pink)'; });
    dz.addEventListener('drop', (e) => {
        e.preventDefault();
        dz.style.borderColor = 'var(--neon-pink)';
        if(e.dataTransfer.files.length > 0) {
            window.handleFileSelect(e.dataTransfer.files);
        }
    });

    // При открытии страницы грузим библиотеку
    window.onload = () => {
        window.renderLibrary();
    };
</script>

</body>
</html>
